# Clearearth — only on port 3333. Port :80 intentionally does NOT serve this app.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 204;
}

server {
    listen 3333;
    listen [::]:3333;
    server_name _;

    # nginx defaults to 1m, which rejects most phone-camera photo uploads
    # (inspection reports, deal images, GRN item photos, etc.) with a 413
    # whose HTML error body breaks the frontend's JSON parsing. Match the
    # backend's own Multer/express limits (20MB/25MB).
    client_max_body_size 25m;

    root /var/www/clearearth-frontend/dist;
    index index.html;

    # Hashed Vite assets are immutable; never cache the SPA shell (index.html).
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
